default: &default
  dispatchers:
    - polling_interval: 1
      batch_size: 500
  workers:
    - queues: "default"
      threads: 3
      processes: <%= ENV.fetch("JOB_CONCURRENCY", 1) %>
      polling_interval: 0.1
    - queues: "campaigns"
      threads: 5
      processes: <%= ENV.fetch("JOB_CONCURRENCY", 1) %>
      polling_interval: 0.1
    - queues: "list_cleanup"
      threads: 1
      processes: 1
      polling_interval: 1
    - queues: "email_ingestion"
      threads: 2
      processes: 1
      polling_interval: 1
    # Dedicated worker for scheduled/recurring tasks. It MUST be its own worker
    # (not merged into "default") so heavy catch-up jobs — e.g. clearing a large
    # finished-jobs backlog, prune, auto-close — run on their own threads and
    # cannot starve the default queue's threads. Without a worker on this queue,
    # recurring tasks (drip_sweep, prune, mailbox polling, digests) never run.
    - queues: "solid_queue_recurring"
      threads: 2
      processes: 1
      polling_interval: 1

development:
  <<: *default

test:
  <<: *default

production:
  <<: *default
